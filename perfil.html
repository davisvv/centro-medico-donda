<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Perfil - Centro Médico DONDA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --verde-principal: #00cc99;
            --verde-fondo: #e6fcf5;
            --gris-oscuro: #111111;
            --texto-suave: #666666;
            --gris-borde: #eeeeee;
            --gris-fondo: #f9f9f9;
            --rojo-suave: #ffebe6;
            --rojo-texto: #ff4d4d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #ffffff;
            color: var(--gris-oscuro);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* HEADER DEL MÓDULO */
        .header-modulo {
            padding: 24px;
            border-bottom: 1px solid var(--gris-borde);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-modulo h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .contenedor-perfil {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* TARJETA DE IDENTIFICACIÓN DEL MÉDICO */
        .tarjeta-usuario {
            background: var(--gris-fondo);
            padding: 20px;
            border-radius: 16px;
            border: 1.5px solid var(--gris-borde);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar-grande {
            width: 64px;
            height: 64px;
            background: var(--verde-principal);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
        }

        .user-info .nombre {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .user-info .rol {
            font-size: 13px;
            color: var(--verde-principal);
            font-weight: 600;
            background: var(--verde-fondo);
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        /* SECCIONES DE INFORMACIÓN EN LISTA */
        .seccion-info {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .seccion-titulo {
            font-size: 12px;
            font-weight: 600;
            color: var(--texto-suave);
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 4px;
        }

        .dato-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--gris-borde);
            font-size: 14px;
        }

        .dato-item label {
            color: var(--texto-suave);
            font-weight: 500;
        }

        .dato-item span {
            font-weight: 600;
        }

        /* BOTÓN COMERCIAL DE CERRAR SESIÓN */
        .btn-cerrar-sesion {
            width: 100%;
            padding: 14px;
            background: var(--rojo-suave);
            color: var(--rojo-texto);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            transition: 0.2s;
        }

        .btn-cerrar-sesion:active {
            transform: scale(0.98);
            background: #ffdcd4;
        }

        /* NAV INFERIOR AJUSTADA A 4 BOTONES (ROL MÉDICO) */
        .nav-inferior {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 74px;
            background: #ffffff;
            border-top: 1px solid var(--gris-borde);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--texto-suave);
            font-size: 11px;
            font-weight: 500;
            gap: 5px;
            width: 25%;
            /* Ajustado para distribuir perfectamente 4 botones */
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.activo {
            color: var(--verde-principal);
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="header-modulo">
        <h1>Mi Perfil</h1>
        <i class="bi bi-gear" style="font-size: 20px; color: var(--texto-suave); cursor: pointer;"></i>
    </div>

    <div class="contenedor-perfil">
        <div class="tarjeta-usuario">
            <div class="avatar-grande">DP</div>
            <div class="user-info">
                <div class="nombre">Dr. Alejandro Pérez</div>
                <div class="rol">Médico Especialista</div>
            </div>
        </div>

        <div class="seccion-info">
            <div class="seccion-titulo">Datos Profesionales</div>
            <div class="dato-item"><label>Registro Médico</label><span>RM-987654-CO</span></div>
            <div class="dato-item"><label>Especialidad</label><span>Medicina Interna</span></div>
            <div class="dato-item"><label>Consultorio Principal</label><span>Sede Norte - Bloque 302</span></div>
        </div>

        <div class="seccion-info">
            <div class="seccion-titulo">Cuenta y Seguridad</div>
            <div class="dato-item"><label>Correo Corporativo</label><span>a.perez@donda.com</span></div>
            <div class="dato-item"><label>Teléfono de Contacto</label><span>315 777 8899</span></div>
            <div class="dato-item"><label>Contraseña</label><span>••••••••••••</span></div>
        </div>

        <button class="btn-cerrar-sesion" onclick="window.location='login.html'">
            <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
        </button>
    </div>

    <nav class="nav-inferior">
        <a class="nav-item" href="dashboard.html"><i class="bi bi-house"></i>Inicio</a>
        <a class="nav-item" href="citas.html"><i class="bi bi-calendar"></i>Citas</a>
        <a class="nav-item" href="pacientes.html"><i class="bi bi-people"></i>Pacientes</a>
        <a class="nav-item activo" href="perfil.html"><i class="bi bi-person-circle"></i>Perfil</a>
    </nav>

</body>

</html>
