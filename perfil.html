<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Perfil - Centro Médico DONDA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --verde: #0F6E56;
            --verde-oscuro: #085041;
            --verde-claro: #E1F5EE;
            --gris-fondo: #F4F6F8;
            --gris-borde: #DEE2E6;
            --texto: #1A1A2E;
            --texto-suave: #6C757D;
            --rojo-suave: #FCEBEB;
            --rojo-texto: #A32D2D;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #fff;
            color: var(--texto);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: var(--verde);
            padding: 16px 24px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar a {
            color: #fff;
            font-size: 20px;
            text-decoration: none;
        }

        .topbar-titulo {
            flex: 1;
        }

        .topbar-titulo h2 {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
        }

        .topbar-titulo p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 2px;
        }

        .topbar-gear {
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            cursor: pointer;
        }

        /* ── CONTENIDO ── */
        .contenedor-perfil {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ── TARJETA USUARIO ── */
        .tarjeta-usuario {
            background: var(--gris-fondo);
            padding: 20px;
            border-radius: 16px;
            border: 1.5px solid var(--gris-borde);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar-grande {
            width: 64px;
            height: 64px;
            background: var(--verde);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .user-info .nombre {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .user-info .rol {
            font-size: 13px;
            color: var(--verde);
            font-weight: 600;
            background: var(--verde-claro);
            padding: 3px 10px;
            border-radius: 6px;
            display: inline-block;
        }

        /* ── SECCIONES ── */
        .seccion-titulo {
            font-size: 12px;
            font-weight: 600;
            color: var(--texto-suave);
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 4px;
        }

        .seccion-info {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: #fff;
            border-radius: 14px;
            border: 1px solid var(--gris-borde);
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .dato-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--gris-borde);
            font-size: 14px;
        }

        .dato-item:last-child {
            border-bottom: none;
        }

        .dato-item label {
            color: var(--texto-suave);
            font-weight: 500;
        }

        .dato-item span {
            font-weight: 600;
            color: var(--texto);
        }

        /* ── BOTÓN CERRAR SESIÓN ── */
        .btn-cerrar-sesion {
            width: 100%;
            padding: 14px;
            background: var(--rojo-suave);
            color: var(--rojo-texto);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-cerrar-sesion:hover {
            background: #f5d5d5;
        }

        .btn-cerrar-sesion:active {
            transform: scale(0.98);
        }

        /* ── NAV INFERIOR ── */
        .nav-inferior {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 74px;
            background: #fff;
            border-top: 1px solid var(--gris-borde);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--texto-suave);
            font-size: 11px;
            font-weight: 500;
            gap: 5px;
            width: 25%;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.activo {
            color: var(--verde);
            font-weight: 600;
        }

        .nav-item:hover {
            color: var(--verde);
        }
    </style>
</head>

<body>

    <!-- TOPBAR CON BOTÓN ATRÁS -->
    <div class="topbar">
        <a href="dashboard.html"><i class="bi bi-arrow-left"></i></a>
        <div class="topbar-titulo">
            <h2>Mi Perfil</h2>
            <p>Dr. Alejandro Pérez</p>
        </div>
        <i class="bi bi-gear topbar-gear"></i>
    </div>

    <div class="contenedor-perfil">

        <!-- TARJETA USUARIO -->
        <div class="tarjeta-usuario">
            <div class="avatar-grande">DP</div>
            <div class="user-info">
                <div class="nombre">Dr. Alejandro Pérez</div>
                <div class="rol">Médico Especialista</div>
            </div>
        </div>

        <!-- DATOS PROFESIONALES -->
        <div>
            <div class="seccion-titulo">Datos Profesionales</div>
            <div class="seccion-info">
                <div class="dato-item"><label>Registro Médico</label><span>RM-987654-CO</span></div>
                <div class="dato-item"><label>Especialidad</label><span>Medicina Interna</span></div>
                <div class="dato-item"><label>Consultorio Principal</label><span>Sede Norte - Bloque 302</span></div>
            </div>
        </div>

        <!-- CUENTA Y SEGURIDAD -->
        <div>
            <div class="seccion-titulo">Cuenta y Seguridad</div>
            <div class="seccion-info">
                <div class="dato-item"><label>Correo Corporativo</label><span>a.perez@donda.com</span></div>
                <div class="dato-item"><label>Teléfono de Contacto</label><span>315 777 8899</span></div>
                <div class="dato-item"><label>Contraseña</label><span>••••••••••••</span></div>
            </div>
        </div>

        <!-- BOTÓN CERRAR SESIÓN -->
        <button class="btn-cerrar-sesion" onclick="window.location='index.html'">
            <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
        </button>

    </div>

    <!-- NAV INFERIOR -->
    <nav class="nav-inferior">
        <a class="nav-item" href="dashboard.html"><i class="bi bi-house"></i>Inicio</a>
        <a class="nav-item" href="citas.html"><i class="bi bi-calendar"></i>Citas</a>
        <a class="nav-item" href="pacientes.html"><i class="bi bi-people"></i>Pacientes</a>
        <a class="nav-item activo" href="perfil.html"><i class="bi bi-person-circle"></i>Perfil</a>
    </nav>

</body>

</html>
